<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>كروت فرح أبو حفص & نمارق - ستوري واتساب</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@300;400;500;700;800&display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, #2d1a15 0%, #4a2c24 100%);
      min-height: 100vh;
      padding: 1.5rem;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
    }

    .header {
      text-align: center;
      margin-bottom: 2rem;
    }

    .header h1 {
      color: #fff5e8;
      font-size: 1.6rem;
      font-weight: 700;
      text-shadow: 0 2px 5px rgba(0,0,0,0.3);
    }

    .header h1 i {
      color: #ffaa88;
      margin: 0 6px;
      animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.1); }
    }

    .header p {
      color: #ffddcc;
      font-size: 0.85rem;
      margin-top: 5px;
    }

    .cards-scroll {
      display: flex;
      overflow-x: auto;
      gap: 1.2rem;
      padding: 1rem 0.5rem 2rem;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
    }

    .cards-scroll::-webkit-scrollbar {
      height: 4px;
    }

    .cards-scroll::-webkit-scrollbar-track {
      background: #6b4136;
      border-radius: 10px;
    }

    .cards-scroll::-webkit-scrollbar-thumb {
      background: #f4a07a;
      border-radius: 10px;
    }

    /* تصميم مبسط للكارت لتجنب مشاكل html2canvas */
    .story-card {
      flex: 0 0 auto;
      width: 310px;
      height: 550px;
      background: linear-gradient(145deg, #fffaf5, #ffece3);
      border-radius: 55px;
      box-shadow: 0 25px 40px rgba(0,0,0,0.35);
      position: relative;
      overflow: hidden;
      scroll-snap-align: start;
      transition: transform 0.25s ease;
      cursor: pointer;
      border: 2px solid #ffddcf;
    }

    .story-card:active {
      transform: scale(0.97);
    }

    /* خلفية بسيطة من القلوب بدون تعقيد */
    .card-bg-pattern {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 1;
    }

    .float-element {
      position: absolute;
      font-size: 16px;
      color: rgba(230, 110, 85, 0.15);
    }

    .card-inner {
      position: relative;
      z-index: 10;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      padding: 1.5rem 1.2rem;
      text-align: center;
    }

    /* تدرج بسيط لخلفية النصوص */
    .badge-count {
      background: #e26d52;
      display: inline-block;
      padding: 5px 18px;
      border-radius: 50px;
      color: white;
      font-size: 0.7rem;
      font-weight: bold;
      box-shadow: 0 2px 8px rgba(0,0,0,0.15);
    }

    .days-remaining {
      font-size: 3rem;
      font-weight: 800;
      color: #c44a2e;
      line-height: 1.2;
      margin: 5px 0;
      text-shadow: none;
    }

    .hijri-date-big {
      background: #fff0e6;
      display: inline-block;
      padding: 3px 14px;
      border-radius: 40px;
      font-size: 0.7rem;
      color: #b15a42;
      font-weight: bold;
    }

    .couple-name {
      font-size: 1.5rem;
      font-weight: 800;
      color: #a13c28;
      margin: 10px 0;
    }

    .sudani-message {
      background: #fffbf5;
      border-radius: 40px;
      padding: 12px 10px;
      margin: 12px 0;
      font-size: 0.8rem;
      line-height: 1.6;
      color: #4f3128;
      border: 1px solid #ffcfbb;
    }

    .location-time {
      font-size: 0.7rem;
      color: #bd7861;
      display: flex;
      justify-content: center;
      gap: 8px;
      flex-wrap: wrap;
      background: #fff3ec;
      padding: 6px 8px;
      border-radius: 50px;
      margin-top: 5px;
    }

    .save-icon {
      background: #e27a60;
      border: none;
      padding: 8px 16px;
      border-radius: 40px;
      color: white;
      font-family: 'Tajawal', sans-serif;
      font-weight: bold;
      font-size: 0.7rem;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
      transition: 0.05s linear;
    }

    .save-icon:active {
      transform: scale(0.96);
    }

    .footer-emoji {
      font-size: 0.65rem;
      color: #c58b74;
      margin-top: 8px;
    }

    .info-footer {
      text-align: center;
      margin-top: 2rem;
      color: #ffefe5;
      background: rgba(0,0,0,0.3);
      padding: 0.7rem;
      border-radius: 60px;
      font-size: 0.75rem;
    }

    @media (max-width: 480px) {
      .story-card {
        width: 280px;
        height: 500px;
      }
      .couple-name {
        font-size: 1.3rem;
      }
      .days-remaining {
        font-size: 2.5rem;
      }
    }
  </style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1><i class="fas fa-heart"></i> كروت الفرحة السودانية <i class="fas fa-heart"></i></h1>
    <p>زفاف أبو حفص & نمارق | اضغط ع الكارت وخرّجه للستوري مباشرة</p>
  </div>

  <div class="cards-scroll" id="cardsScroll"></div>
  <div class="info-footer">
    <i class="fas fa-download"></i> اضغط على أي كارد عشان تنزله كصورة وترفعه ستوري واتساب<br>
    <i class="fas fa-calendar-alt"></i> الكروت من 19 ذو القعدة لي 12 ذو الحجة (الموافق 6 مايو - 29 مايو 2026)
  </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
  // التواريخ
  const weddingDate = new Date(2026, 4, 29, 12, 0, 0);
  const startDate = new Date(2026, 4, 6, 0, 0, 0);
  const endDate = new Date(2026, 4, 29, 0, 0, 0);
  
  const locationText = "الجزيرة - ريفي المسلمية - قرية هزاوي";
  const timeText = "قبل صلاة الجمعة الساعة 12 الظهر";
  
  const sudaniMessages = [
    "💛 تعالو شاركونا الفرحة، العرس جاي وما بنستغنى عن حضوركم 💛",
    "🌹 والله فرحتنا بتتم بيكم، ان شاء الله تكونو معانا 🌹",
    "🎊 يا هلا والله، العرس قرّب، ما تنسونا 🎊",
    "✨ نورونا بحضوركم الجميل، دايرين نفرح بيكم ✨",
    "🌸 الفرحة زادت، مستنيينكم بفارغ الصبر 🌸",
    "💑 يا عسى الله يبارك في جمعتنا، تفضلو تشرفو 💑",
    "🎁 زفاف أبو حفص ونمارق، والله حضوركم يزينا 🎁",
    "⭐ تعالو نعيش الفرحة سوا، العرس في انتظاركم ⭐",
    "🍃 ما تقصروا، فرحتنا بدوّنكم، استنونا 🍃",
    "❤️ من القلب لي القلب، يا ريت تكونو معانا في العرس ❤️"
  ];
  
  function getHijriForDate(date) {
    const day = date.getDate();
    if (date.getFullYear() === 2026 && date.getMonth() === 4) {
      const hijriMap = {
        6: "19 ذو القعدة 1447", 7: "20 ذو القعدة 1447", 8: "21 ذو القعدة 1447",
        9: "22 ذو القعدة 1447", 10: "23 ذو القعدة 1447", 11: "24 ذو القعدة 1447",
        12: "25 ذو القعدة 1447", 13: "26 ذو القعدة 1447", 14: "27 ذو القعدة 1447",
        15: "28 ذو القعدة 1447", 16: "29 ذو القعدة 1447", 17: "30 ذو القعدة 1447",
        18: "1 ذو الحجة 1447", 19: "2 ذو الحجة 1447", 20: "3 ذو الحجة 1447",
        21: "4 ذو الحجة 1447", 22: "5 ذو الحجة 1447", 23: "6 ذو الحجة 1447",
        24: "7 ذو الحجة 1447", 25: "8 ذو الحجة 1447", 26: "9 ذو الحجة 1447",
        27: "10 ذو الحجة 1447", 28: "11 ذو الحجة 1447", 29: "12 ذو الحجة 1447"
      };
      return hijriMap[day] || `${day} ذو القعدة 1447`;
    }
    return `${day} شهر 1447`;
  }
  
  function formatGregorian(date) {
    const days = ['الأحد', 'الإثنين', 'الثلاثاء', 'الأربعاء', 'الخميس', 'الجمعة', 'السبت'];
    const months = ['يناير', 'فبراير', 'مارس', 'أبريل', 'مايو', 'يونيو', 'يوليو', 'أغسطس', 'سبتمبر', 'أكتوبر', 'نوفمبر', 'ديسمبر'];
    return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]} ${date.getFullYear()}`;
  }
  
  function daysToWedding(currentDate) {
    const diff = weddingDate - currentDate;
    return Math.ceil(diff / (1000 * 60 * 60 * 24));
  }
  
  function getAllDays() {
    const days = [];
    let current = new Date(startDate);
    while (current <= endDate) {
      days.push(new Date(current));
      current.setDate(current.getDate() + 1);
    }
    return days;
  }
  
  const allDays = getAllDays();
  const container = document.getElementById('cardsScroll');
  
  // دالة حفظ الصورة - بدون أي تظليل
  async function saveCardAsImage(cardElement) {
    if (!cardElement) return;
    
    // تعطيل المؤثرات المؤقتة التي قد تسبب مشاكل
    const saveBtn = cardElement.querySelector('.save-icon');
    let btnOriginalHtml = '';
    if (saveBtn) {
      btnOriginalHtml = saveBtn.innerHTML;
      saveBtn.innerHTML = '<i class="fas fa-spinner fa-pulse"></i> يتم...';
      saveBtn.disabled = true;
    }
    
    try {
      // انتظار بسيط لاستقرار العناصر
      await new Promise(resolve => setTimeout(resolve, 30));
      
      const canvas = await html2canvas(cardElement, {
        scale: 3,
        backgroundColor: '#fff8f3',
        logging: false,
        useCORS: true,
        allowTaint: false,
        windowWidth: cardElement.scrollWidth,
        windowHeight: cardElement.scrollHeight,
        onclone: (clonedDoc, element) => {
          // التأكد من أن النصوص واضحة في النسخة المستنسخة
          const texts = element.querySelectorAll('.days-remaining, .couple-name, .sudani-message');
          texts.forEach(text => {
            text.style.textShadow = 'none';
            text.style.webkitTextStroke = 'none';
          });
        }
      });
      
      // حفظ الصورة
      const link = document.createElement('a');
      link.download = `farah_${Date.now()}.png`;
      link.href = canvas.toDataURL('image/png');
      link.click();
      
    } catch (error) {
      console.error('خطأ:', error);
      alert('حدث خطأ، حاول مرة أخرى');
    } finally {
      if (saveBtn) {
        saveBtn.innerHTML = btnOriginalHtml;
        saveBtn.disabled = false;
      }
    }
  }
  
  // إنشاء الكروت
  allDays.forEach((day, idx) => {
    const remaining = daysToWedding(day);
    const isToday = (day.toDateString() === new Date().toDateString());
    const isWeddingDay = (remaining === 0);
    
    let badgeText = "";
    let daysText = "";
    let celebrationText = "";
    
    if (isWeddingDay) {
      badgeText = "🎉 اليوم العرس الكبير 🎉";
      daysText = "يوم الفرحة";
      celebrationText = "🎊 النهار ده العرس! مستنياكم في الزفة والطرب، الفرحة ما تكتمل بدونكم 🎊";
    } else if (remaining === 1) {
      badgeText = "🔥 بكرة العرس 🔥";
      daysText = "غداً الفرحة";
      celebrationText = "⏰ بكرة الساعة 12 قبل صلاة الجمعة، جهزوا أحلى الأزياء و تعالو نفرح سوا ⏰";
    } else if (remaining <= 3) {
      badgeText = `⭐ باقي ${remaining} أيام ونجتمع ⭐`;
      daysText = `${remaining} أيام`;
      celebrationText = `خلص بقى ${remaining} يوم ونشوف بعض في العرس، ما تتأخروا علينا!`;
    } else {
      badgeText = `متبقي من الايام`;
      daysText = `${remaining}`;
      celebrationText = sudaniMessages[idx % sudaniMessages.length];
    }
    
    if (!isWeddingDay && remaining !== 1 && remaining > 3) {
      celebrationText += `<br><span style="font-size:0.7rem;">⏰ الزفاف الساعة 12 الظهر قبل صلاة الجمعة ⏰</span>`;
    }
    
    // إنشاء الكارت
    const card = document.createElement('div');
    card.className = 'story-card';
    
    // إضافة خلفية قلوب بسيطة
    const bgPattern = document.createElement('div');
    bgPattern.className = 'card-bg-pattern';
    for (let i = 0; i < 30; i++) {
      const heart = document.createElement('i');
      heart.className = 'fas fa-heart float-element';
      heart.style.left = Math.random() * 100 + '%';
      heart.style.top = Math.random() * 100 + '%';
      heart.style.fontSize = (Math.random() * 20 + 10) + 'px';
      heart.style.opacity = Math.random() * 0.2 + 0.05;
      heart.style.color = '#e26d52';
      bgPattern.appendChild(heart);
    }
    
    const inner = document.createElement('div');
    inner.className = 'card-inner';
    const hijri = getHijriForDate(day);
    
    inner.innerHTML = `
      <div>
        <div style="font-size:2rem; margin-bottom:5px;">👑</div>
        <div class="badge-count">
          <i class="fas fa-calendar-heart"></i> ${badgeText}
        </div>
        <div class="days-remaining">
          ${daysText}
        </div>
        <div class="hijri-date-big">
          <i class="fas fa-moon"></i> ${hijri}
        </div>
        <div style="font-size:0.6rem; color:#b36c54; margin:5px 0;">
          ${formatGregorian(day)} ${isToday ? ' 🔴 اليوم' : ''}
        </div>
      </div>
      
      <div>
        <div class="couple-name">
          ❤️ أبو حفص & نمارق ❤️
        </div>
        <div class="sudani-message">
          ${celebrationText}
        </div>
        <div class="location-time">
          <span>📍 ${locationText}</span>
          <span>⏰ ${timeText}</span>
        </div>
      </div>
      
      <div>
        <button class="save-icon" type="button">
          📸 احفظ الكرت
        </button>
        <div class="footer-emoji">
          💕 يا رب تتم الفرحة بيكم 💕
        </div>
      </div>
    `;
    
    card.appendChild(bgPattern);
    card.appendChild(inner);
    
    // ربط حدث الحفظ
    const saveBtn = inner.querySelector('.save-icon');
    saveBtn.addEventListener('click', async (e) => {
      e.stopPropagation();
      await saveCardAsImage(card);
    });
    
    // الضغط على الكارت للحفظ
    card.addEventListener('click', async (e) => {
      if (e.target === saveBtn || saveBtn.contains(e.target)) return;
      await saveCardAsImage(card);
    });
    
    container.appendChild(card);
  });
  
  console.log(`✅ تم إنشاء ${allDays.length} كرت - مشكلة التظليل محلولة`);
</script>
</body>
</html>
